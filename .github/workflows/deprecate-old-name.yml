name: Deprecate old package name

# One-off manual job: marks the old spacedata-cli package as deprecated on
# npm, pointing users to spacedata. Safe to delete after running once.
on: workflow_dispatch

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Deprecate spacedata-cli
        run: npm deprecate spacedata-cli@"*" "Renamed to 'spacedata' — install with 'npm install -g spacedata'."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
