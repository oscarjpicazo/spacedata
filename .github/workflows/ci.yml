name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: make setup

      - name: Build (typecheck + bundle)
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make check
